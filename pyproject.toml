[project]
name = "sideroxylon"
version = "0.1.0"
authors = [
  { name="Geralld Borbón", email="eternalmangocean@gmail.com" },
]
description = "A GitHub repository classifier."
readme = "README.md"
requires-python = ">=3.14"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
license = "GPL-3.0-or-later"
license-files = ["LICEN[CS]E*"]
dependencies = [
    "requests>=2.33.0",
    "typer>=0.24.1",
]

[project.urls]
Homepage = "https://github.com/bormoge/sideroxylon"
Issues = "https://github.com/bormoge/sideroxylon/issues"

[project.scripts]
sideroxylon = "sideroxylon.cli:app"

[build-system]
requires = ["uv_build >= 0.11.0"]
build-backend = "uv_build"
