name: Build and publish a sideroxylon version to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  sideroxylon-build:
    name: Build a sideroxylon version
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build dists
        run: python -m build

      - name: Upload dists
        uses: actions/upload-artifact@v6
        with:
          name: dists-artifact
          path: dist/
          retention-days: 1

  sideroxylon-publish:
    name: Publish a sideroxylon version to PyPI
    needs: sideroxylon-build
    runs-on: ubuntu-latest
    environment: pypi # Specifying a GitHub environment is optional, but strongly encouraged
    permissions:
      id-token: write # IMPORTANT: "id-token: write" permission is mandatory for Trusted Publishing
      contents: read

    steps:
      - name: Download dists
        uses: actions/download-artifact@v7
        with:
          name: dists-artifact
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
